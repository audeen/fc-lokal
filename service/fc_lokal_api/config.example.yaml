site:
  latitude: 52.5200
  longitude: 13.4050
  timezone: Europe/Berlin
  grid_output_limit_watts: 1200
  battery_charge_limit_watts: 2600
  system_total_limit_watts: 2600
  planes:
    - name: main_roof
      declination: 25
      azimuth: 180
      kwp: 1.6

home_assistant:
  base_url: http://homeassistant.local:8123
  token: "PASTE_LONG_LIVED_ACCESS_TOKEN_HERE"
  verify_ssl: true
  timeout_seconds: 10
  sensors:
    pv_power_entity_id: sensor.solakon_one_total_pv_power
    pv_energy_today_entity_id: sensor.solakon_one_daily_generation
    inverter_power_entity_id: sensor.solakon_one_active_power
    grid_power_entity_id: sensor.shellypro3em_ac15187c6ea4_total_active_power
    battery_power_entity_id: sensor.solakon_one_battery_combined_power
    # Optional battery SoC for dynamic clipping at high charge states (0..100)
    battery_soc_entity_id: sensor.solakon_one_battery_soc
  interpretation:
    battery_power_sign: negative_is_charging
    grid_power_sign: positive_is_import
    battery_charging_from_grid_possible: false

open_meteo:
  base_url: https://api.open-meteo.com/v1/forecast
  forecast_days: 3
  model: best_match
  timeout_seconds: 15

pvgis:
  base_url: https://re.jrc.ec.europa.eu/api/v5_3/PVcalc
  enabled: true
  loss_percent: 14
  pvtechchoice: crystSi
  mountingplace: free
  usehorizon: true
  timeout_seconds: 30

engine:
  use_pvgis_calibration: true
  pvgis_weight: 0.35
  min_scale: 0.25
  max_scale: 1.6
  live_power_weight: 0.55
  daily_energy_weight: 0.45
  low_light_threshold_wm2: 10
  temperature_coefficient_per_c: 0.004
  # Optional: when battery SoC is high, clip forecast to this lower export-like cap
  battery_full_soc_threshold: 98
  limit_when_battery_full_watts: 1300
